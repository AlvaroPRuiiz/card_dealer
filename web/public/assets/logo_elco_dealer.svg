      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#D6A94F" flood-opacity="0.24"/>
    </filter>
    <filter id="innerGlow" x="119" y="119" width="786" height="786" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

