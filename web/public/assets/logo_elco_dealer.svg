      <stop offset="0.58" stop-color="#F3CA64"/>
      <stop offset="0.8" stop-color="#9B5A16"/>
      <stop offset="1" stop-color="#FFE28A"/>
    </linearGradient>
    <linearGradient id="panel" x1="237" y1="214" x2="785" y2="810" gradientUnits="userSpaceOnUse">
